<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS DISCORD BOT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* background scanlines + glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,240,255,0.18), transparent 45%),
    radial-gradient(circle at 80% 60%, rgba(0,120,255,0.12), transparent 50%),
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:auto, auto, 100% 4px;
  animation:bgMove 12s ease-in-out infinite alternate;
  z-index:0;
}

@keyframes bgMove{
  from{transform:translate(0,0)}
  to{transform:translate(-60px,-40px)}
}

/* cursor glow */
body::after{
  content:"";
  position:fixed;
  width:240px;
  height:240px;
  background:radial-gradient(circle, rgba(0,240,255,0.18), transparent 70%);
  left:var(--x);
  top:var(--y);
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:1;
}

/* BOOT SCREEN */
#boot{
  position:fixed;
  inset:0;
  background:#020617;
  z-index:999;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:monospace;
  color:#00f0ff;
  transition:opacity 0.8s ease;
}

#bootText{
  font-size:15px;
  white-space:pre-line;
}

.cursor::after{
  content:"▍";
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0}
}

/* MAIN */
.wrapper{
  position:relative;
  z-index:2;
  text-align:center;
  padding:80px 20px;
  opacity:0;
  transform:translateY(10px);
  transition:1s ease;
}

.wrapper.show{
  opacity:1;
  transform:translateY(0);
}

/* TITLE */
.title{
  font-size:5rem;
  font-weight:800;
  color:#00f0ff;
  text-shadow:0 0 25px rgba(0,240,255,0.6);
}

/* HOLOGRAM CORE */
.holo{
  position:fixed;
  top:50%;
  left:50%;
  width:340px;
  height:340px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,240,255,0.25), transparent 60%);
  filter:blur(25px);
  animation:pulse 3s infinite ease-in-out;
  z-index:1;
  pointer-events:none;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);opacity:0.5}
  50%{transform:translate(-50%,-50%) scale(1.25);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}
}

/* BRAIN PANEL */
#brain{
  position:fixed;
  right:20px;
  top:20px;
  width:260px;
  padding:12px;
  font-size:12px;
  font-family:monospace;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,240,255,0.2);
  backdrop-filter:blur(12px);
  z-index:10;
}

.brain-line{
  color:#94a3b8;
  margin:4px 0;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,240,255,0.15);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:14px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 0 25px rgba(0,240,255,0.2);
}

/* glow text */
.glow{
  color:#00f0ff;
  text-shadow:0 0 20px rgba(0,240,255,0.7);
}
#hologram{
  position:fixed;
  top:45%;
  left:20%;
  width:400px;
  height:400px;
  transform:translate(-50%,-50%);
  z-index:1;
  pointer-events:none;
  filter:drop-shadow(0 0 20px #00f0ff);
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="bootText"></div>
</div>

<!-- HOLOGRAM -->
<div class="holo"></div>

<!-- MAIN -->
<div class="wrapper" id="main">

  <h1 class="title glow">JARVIS</h1>

  <div id="hologram"></div>

  <p style="color:#94a3b8; max-width:600px; margin:20px auto;">
    Visual AI core interface. Monitoring system processes in real-time.
  </p>

  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:30px;">
    <a class="card" href="https://discord.com/oauth2/authorize?client_id=1507762062359531580&permissions=8&scope=bot+applications.commands">Add to Discord</a>
    <a class="card" href="https://discord.gg/CQPSWuvtSj">Join Server</a>
  </div>

  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-top:60px;">

    <div class="card">
      <h3 class="glow">AI MODULE</h3>
      <p style="color:#94a3b8;">System ready</p>
    </div>

    <div class="card">
      <h3 class="glow">IMAGE CORE</h3>
      <p style="color:#94a3b8;">Rendering engine active</p>
    </div>

    <div class="card">
      <h3 class="glow">DATA STREAM</h3>
      <p style="color:#94a3b8;">Live processing enabled</p>
    </div>

  </div>

</div>

<script>
/* cursor */
document.addEventListener("mousemove",(e)=>{
  document.body.style.setProperty("--x", e.clientX + "px");
  document.body.style.setProperty("--y", e.clientY + "px");
});

/* boot text */
const lines = [
  "Initializing JARVIS CORE...",
  "Loading holographic UI...",
  "Syncing neural systems...",
  "Calibrating interface...",
  "SYSTEM ONLINE"
];

let i = 0;
let bootText = document.getElementById("bootText");

function typeLine(text, cb){
  let idx = 0;
  bootText.classList.add("cursor");

  const interval = setInterval(()=>{
    bootText.innerHTML += text.charAt(idx);
    idx++;

    if(idx >= text.length){
      clearInterval(interval);
      bootText.innerHTML += "\n";
      cb();
    }
  }, 30);
}

function next(){
  if(i < lines.length){
    typeLine(lines[i], ()=>{
      i++;
      setTimeout(next, 250);
    });
  } else {
    setTimeout(()=>{
      document.getElementById("boot").style.opacity="0";
      document.getElementById("main").classList.add("show");

      setTimeout(()=>{
        document.getElementById("boot").remove();
      },800);
    },500);
  }
}

next();


</script>
<script>
const container = document.getElementById("hologram");

// scene
const scene = new THREE.Scene();

// camera
const camera = new THREE.PerspectiveCamera(
  60,
  400 / 400,
  0.1,
  1000
);
camera.position.z = 3;

// renderer
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(400, 400);
container.appendChild(renderer.domElement);

// geometry (hologram core)
const geometry = new THREE.IcosahedronGeometry(1, 1);

// wireframe material (hologram look)
const material = new THREE.MeshBasicMaterial({
  color: 0x00f0ff,
  wireframe: true,
  transparent: true,
  opacity: 0.9
});

const core = new THREE.Mesh(geometry, material);
scene.add(core);

// outer ring
const ringGeo = new THREE.TorusGeometry(1.5, 0.02, 16, 100);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x00f0ff,
  transparent: true,
  opacity: 0.5
});

const ring = new THREE.Mesh(ringGeo, ringMat);
scene.add(ring);

// animation
function animate(){
  requestAnimationFrame(animate);

  core.rotation.x += 0.01;
  core.rotation.y += 0.015;

  ring.rotation.x += 0.005;
  ring.rotation.z += 0.01;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
